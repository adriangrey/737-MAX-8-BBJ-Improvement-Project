; 737 MAX 8 BBJ Improvement Project v0.1.0-alpha
; Created by Adrian Grey
; Adds BBJ-style long-range fuel capacity to the default MSFS 2024 737 MAX 8 BBJ preset.
; Stock fuel capacity: 6,820 gal / ~45,694 lb
; Enhanced fuel capacity: 10,373 gal / ~69,499 lb
; Current method: increases center tank capacity as a clean modular BBJ preset patch.

